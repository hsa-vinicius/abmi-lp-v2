<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agende sua Sessão Estrátegica – ABMI</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --verde:    #1A3D2B;
      --dourado:  #C9A84C;
      --off-white:#F9F6F0;
      --branco:   #FFFFFF;
      --cinza:    #6B6B6B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--off-white);
      color: var(--verde);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    img { display: block; max-width: 100%; }

    /* ── Nav ── */
    nav {
      background: var(--verde);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 68px;
      flex-shrink: 0;
    }
    nav img { height: 40px; width: auto; }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 44px 24px 32px;
      flex-shrink: 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 40px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
      color: #15803d;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 5vw, 46px);
      font-weight: 700;
      line-height: 1.15;
      color: var(--verde);
      margin-bottom: 12px;
    }
    .hero h1 em { color: var(--dourado); font-style: italic; }
    .hero p {
      font-size: 16px;
      color: var(--cinza);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Cal.com container ── */
    .cal-wrap {
      flex: 1;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 48px;
    }

    #my-cal-inline {
      width: 100%;
      min-height: 650px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      background: var(--branco);
    }

    /* ── Rodapé simples ── */
    footer {
      background: var(--verde);
      text-align: center;
      padding: 20px 24px;
      font-size: 12px;
      color: rgba(255,255,255,.4);
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .hero { padding: 32px 20px 24px; }
      .cal-wrap { padding: 0 16px 36px; }
      #cal-inline, .cal-placeholder { min-height: 500px; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="/" aria-label="ABMI">
      <img src="https://maferpizzoni.com.br/wp-content/uploads/2025/11/logo-abmi.webp" alt="ABMI" />
    </a>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="badge">✅ Aplicação recebida</div>
    <h1>Agende sua <em>Sessão Estratégica</em></h1>
    <p>Escolha o melhor horário para conversar com nossa equipe</p>
  </div>

  <!-- Calendário Cal.com -->
  <div class="cal-wrap">
    <div id="my-cal-inline"></div>
  </div>

  <!-- Footer -->
  <footer>
    © 2025 ABMI – Academia Brasileira de Marketing Imobiliário
  </footer>

  <script type="text/javascript">
    (function(C,A,L){let p=function(a,ar){a.q.push(ar)};let d=C.document;C.Cal=C.Cal||function(){let cal=C.Cal;let ar=arguments;if(!cal.loaded){cal.ns={};cal.q=cal.q||[];d.head.appendChild(d.createElement("script")).src=A;cal.loaded=true}if(ar[0]===L){const api=function(){p(api,arguments)};const namespace=ar[1];api.q=api.q||[];if(typeof namespace==="string"){cal.ns[namespace]=cal.ns[namespace]||api;p(cal.ns[namespace],ar);p(cal,["initNamespace",namespace])}else p(cal,ar);return}p(cal,ar)};"init"in Cal||Cal("init",{origin:"https://app.cal.com"});})(window,"https://app.cal.com/embed/embed.js","init");
    Cal("inline", {
      elementOrSelector: "#my-cal-inline",
      calLink: "team/metro-quadrado/consultoria-estrategica",
      layout: "month_view",
    });
    Cal("ui", {
      theme: "light",
      styles: { branding: { brandColor: "#1A3D2B" } },
      hideEventTypeDetails: false,
    });
  </script>

</body>
</html>
